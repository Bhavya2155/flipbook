<!DOCTYPE html>
<html>
<head>
  <title>Magazines</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; }
    h1 { text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .book {
      background: white;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
    }

    .book:hover {
      transform: scale(1.05);
    }

    .book img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Magazines</h1>

<div class="grid">
  <div class="book" onclick="openBook('book1', 6)">
    <img src="books/book1/1.jpg">
    <p>Book 1</p>
  </div>

  <div class="book" onclick="openBook('book2', 6)">
    <img src="books/book2/1.jpg">
    <p>Book 2</p>
  </div>
</div>

<script>
function openBook(name, pages) {
  window.location.href = `viewer.html?book=${name}&pages=${pages}`;
}
</script>

</body>
</html>
