<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Pro</title>

<!-- LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
<script src="https://hammerjs.github.io/dist/hammer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

/* GRID */
.grid {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 180px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);

  display: flex;
  justify-content: center;
  align-items: center;

  visibility: hidden;
  opacity: 0;
  transition: 0.3s;

  z-index: 999;
}

#overlay.active {
  visibility: visible;
  opacity: 1;
}

/* BOOK */
#flipbook {
  width: min(90vw, 900px);
  height: min(80vh, 650px);

  background: white;
  box-shadow: 0 25px 80px rgba(0,0,0,0.7);
  border-radius: 10px;
  overflow: hidden;
}

/* IMAGE FIX */
#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CLOSE */
#close {
  position: absolute;
  top: 20px;
  right: 25px;
  color: white;
  font-size: 32px;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);

  width: 50px;
  height: 50px;

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(255,255,255,0.15);
  color: white;
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
}

#left { left: 20px; }
#right { right: 20px; }

/* TOOLBAR */
#toolbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  gap: 15px;

  background: rgba(255,255,255,0.15);
  padding: 10px 20px;
  border-radius: 12px;
  color: white;
}

.tool {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="grid" id="books"></div>

<div id="overlay">
  <div id="close" onclick="closeViewer()">✕</div>

  <div id="flipbook"></div>

  <div id="left" class="arrow" onclick="prev()">❮</div>
  <div id="right" class="arrow" onclick="next()">❯</div>

  <div id="toolbar">
    <span class="tool" onclick="zoomIn()">➕</span>
    <span class="tool" onclick="zoomOut()">➖</span>
    <span class="tool" onclick="toggleView()">📖</span>
  </div>
</div>

<script src="data.js"></script>

<script>
const container = document.getElementById("books");

let zoom = 1;
let singlePage = false;

// LOAD BOOKS
books.forEach(book => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${book.cover}">
    <p>${book.title}</p>
  `;

  div.onclick = () => openBook(book);
  container.appendChild(div);
});

// OPEN BOOK (FIXED WITH PROPER IMAGE LOADING)
function openBook(book) {
  document.getElementById("overlay").classList.add("active");

  const flip = $("#flipbook");
  flip.html("");

  let loaded = 0;
  const total = book.pages;

  for (let i = 1; i <= total; i++) {
    const img = new Image();
    img.src = `books/${book.id}/page${i}.jpg`;

    img.onload = () => {
      loaded++;
      flip.append(`<div><img src="${img.src}"></div>`);

      if (loaded === total) {
        initFlipbook();
      }
    };

    img.onerror = () => {
      console.error("Missing:", img.src);
    };
  }
}

// INIT TURN.JS AFTER LOAD
function initFlipbook() {
  const flip = $("#flipbook");

  flip.turn({
    width: flip.width(),
    height: flip.height(),
    autoCenter: true,
    display: window.innerWidth < 768 ? "single" : "double"
  });

  window.currentFlip = flip;
}

// CLOSE
function closeViewer() {
  document.getElementById("overlay").classList.remove("active");
  if (window.currentFlip) window.currentFlip.turn("destroy");
}

// NAVIGATION
function next() {
  if (window.currentFlip) window.currentFlip.turn("next");
}

function prev() {
  if (window.currentFlip) window.currentFlip.turn("previous");
}

// ZOOM
function zoomIn() {
  zoom += 0.2;
  $("#flipbook").css("transform", `scale(${zoom})`);
}

function zoomOut() {
  zoom -= 0.2;
  $("#flipbook").css("transform", `scale(${zoom})`);
}

// TOGGLE VIEW
function toggleView() {
  singlePage = !singlePage;
  if (window.currentFlip) {
    window.currentFlip.turn("display", singlePage ? "single" : "double");
  }
}
</script>

</body>
</html>
