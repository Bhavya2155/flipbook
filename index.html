<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook FIXED</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

.grid {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 180px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);

  display: flex;
  justify-content: center;
  align-items: center;

  visibility: hidden;
  opacity: 0;
  transition: 0.3s;
}

#overlay.active {
  visibility: visible;
  opacity: 1;
}

/* BOOK */
#flipbook {
  width: 95vw;
  height: 90vh;
  background: white;
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* CRITICAL FIX */
#flipbook div {
  width: 100%;
  height: 100%;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CLOSE */
#close {
  position: absolute;
  top: 20px;
  right: 25px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  background: rgba(255,255,255,0.2);
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#left { left: 20px; }
#right { right: 20px; }
</style>
</head>

<body>

<div class="grid" id="books"></div>

<div id="overlay">
  <div id="close" onclick="closeViewer()">✕</div>
  <div id="flipbook"></div>
  <div id="left" class="arrow" onclick="prev()">❮</div>
  <div id="right" class="arrow" onclick="next()">❯</div>
</div>

<script src="data.js"></script>

<script>
const container = document.getElementById("books");

// LOAD BOOKS
books.forEach(book => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${book.cover}">
    <p>${book.title}</p>
  `;

  div.onclick = () => openBook(book);
  container.appendChild(div);
});

// OPEN BOOK
function openBook(book) {
  document.getElementById("overlay").classList.add("active");

  const flip = $("#flipbook");
  flip.html("");

  for (let i = 1; i <= book.pages; i++) {
    flip.append(`<div><img src="books/${book.id}/page${i}.jpg"></div>`);
  }

  setTimeout(() => {
    flip.turn({
      width: flip.width(),
      height: flip.height(),
      autoCenter: true,

      // 🔥 FIX: ALWAYS SINGLE PAGE
      display: "single",

      elevation: 50,
      gradients: true
    });

    window.currentFlip = flip;
  }, 200);
}

// CLOSE
function closeViewer() {
  document.getElementById("overlay").classList.remove("active");
  if (window.currentFlip) window.currentFlip.turn("destroy");
}

// NAVIGATION
function next() {
  if (window.currentFlip) window.currentFlip.turn("next");
}

function prev() {
  if (window.currentFlip) window.currentFlip.turn("previous");
}
</script>

</body>
</html>
