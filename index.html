<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook FINAL ABSOLUTE FIX</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow-x: hidden;
  font-family: sans-serif;
  background: #f2f2f2;
}

/* BOOK GRID */
.grid {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* CARDS */
.card {
  width: 180px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* 🔥 FULLSCREEN OVERLAY (FIXED PROPERLY) */
#overlay {
  position: fixed;
  inset: 0; /* 🔥 strongest fix */

  width: 100vw;
  height: 100vh;

  background: rgba(0,0,0,0.9);

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;

  visibility: hidden;
  opacity: 0;
  transition: 0.3s;
}

#overlay.active {
  visibility: visible;
  opacity: 1;
}

/* BOOK */
#flipbook {
  width: 400px;
  height: 600px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

/* PAGE */
#flipbook div {
  width: 100%;
  height: 100%;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CLOSE */
#close {
  position: absolute;
  top: 20px;
  right: 25px;
  color: white;
  font-size: 32px;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  background: rgba(255,255,255,0.2);
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#left { left: 20px; }
#right { right: 20px; }
</style>
</head>

<body>

<div class="grid" id="books"></div>

<div id="overlay">
  <div id="close" onclick="closeViewer()">✕</div>

  <div id="flipbook"></div>

  <div id="left" class="arrow" onclick="prev()">❮</div>
  <div id="right" class="arrow" onclick="next()">❯</div>
</div>

<script src="data.js"></script>

<script>
const container = document.getElementById("books");

books.forEach(book => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${book.cover}">
    <p>${book.title}</p>
  `;

  div.onclick = () => openBook(book);
  container.appendChild(div);
});

function openBook(book) {
  const overlay = document.getElementById("overlay");
  overlay.classList.add("active");

  document.body.style.overflow = "hidden"; // 🔥 prevent scroll shift

  const flip = $("#flipbook");
  flip.html("");

  for (let i = 1; i <= book.pages; i++) {
    flip.append(`<div><img src="books/${book.id}/page${i}.jpg"></div>`);
  }

  if (flip.data("turn")) {
    flip.turn("destroy");
  }

  flip.turn({
    width: 400,
    height: 600,
    autoCenter: true,
    display: "single"
  });

  window.flip = flip;
}

function closeViewer() {
  document.getElementById("overlay").classList.remove("active");
  document.body.style.overflow = "auto";

  if (window.flip) window.flip.turn("destroy");
}

function next() {
  if (window.flip) window.flip.turn("next");
}

function prev() {
  if (window.flip) window.flip.turn("previous");
}
</script>

</body>
</html>
