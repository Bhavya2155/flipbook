<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magazines</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

h1 {
  text-align: center;
  color: red;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 280px));
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.book img {
  width: 100%;
  border-radius: 12px;
}

/* MODAL */
#viewerModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* BOOK */
#book {
  width: 100%;
  max-width: 90vw;
  max-height: 80vh;
}

/* CONTROLS */
.controls {
  margin-top: 15px;
  background: white;
  padding: 8px 15px;
  border-radius: 8px;
  display: flex;
  gap: 10px;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  #book {
    max-width: 95vw;
    max-height: 70vh;
  }
}
</style>
</head>

<body>

<h1>Magazines</h1>

<div class="grid">
  <div class="book" onclick="openBook('book1')">
    <img src="books/book1/1.jpg">
  </div>

  <div class="book" onclick="openBook('book2')">
    <img src="books/book2/1.jpg">
  </div>
</div>

<div id="viewerModal">
  <div>
    <div id="book"></div>

    <div class="controls">
      <button onclick="prevPage()">⬅</button>
      <span id="pageInfo">1 / 16</span>
      <button onclick="nextPage()">➡</button>
      <button onclick="closeBook()">❌</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
let pageFlip = null;
let totalPages = 16;

function openBook(bookName) {

  const container = document.getElementById("book");

  // 🔥 HARD RESET (fix reopen bug)
  if (pageFlip) {
    pageFlip.destroy();
    pageFlip = null;
  }

  container.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement("div");
    div.classList.add("page");

    const img = document.createElement("img");
    img.src = `books/${bookName}/${i}.jpg`;

    div.appendChild(img);
    container.appendChild(div);
  }

  document.getElementById("viewerModal").style.display = "flex";

  setTimeout(() => {

    const isMobile = window.innerWidth < 768;

    pageFlip = new St.PageFlip(container, {
      width: isMobile ? 280 : 320,
      height: isMobile ? 380 : 430,
      size: "fixed",
      showCover: true,

      // 🔥 KEY PART
      usePortrait: isMobile,   // 1 page mobile, 2 page desktop

      mobileScrollSupport: true,
      swipeDistance: 30
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    updatePageInfo();

    pageFlip.on("flip", updatePageInfo);

  }, 100);
}

function closeBook() {
  if (pageFlip) {
    pageFlip.destroy();
    pageFlip = null;
  }
  document.getElementById("viewerModal").style.display = "none";
}

function nextPage() {
  if (pageFlip) pageFlip.flipNext();
}

function prevPage() {
  if (pageFlip) pageFlip.flipPrev();
}

function updatePageInfo() {
  if (!pageFlip) return;
  document.getElementById("pageInfo").innerText =
    (pageFlip.getCurrentPageIndex() + 1) + " / " + totalPages;
}
</script>

</body>
</html>
