<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Pro Final</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  background: #f2f2f2;
  font-family: sans-serif;
}

/* BOOK LIST */
.grid {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 180px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);

  display: flex;
  justify-content: center;
  align-items: center;

  visibility: hidden;
  opacity: 0;
  transition: 0.3s;
}

#overlay.active {
  visibility: visible;
  opacity: 1;
}

/* BOOK WRAPPER (for zoom) */
#book-wrapper {
  transform-origin: center;
  transition: transform 0.2s;
}

/* BOOK */
#flipbook {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

/* PAGE */
#flipbook div {
  width: 100%;
  height: 100%;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CLOSE */
#close {
  position: absolute;
  top: 20px;
  right: 25px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 45px;
  height: 45px;
  background: rgba(255,255,255,0.2);
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#left { left: 20px; }
#right { right: 20px; }

/* ZOOM BUTTONS */
#zoom-controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.zoom-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="grid" id="books"></div>

<div id="overlay">
  <div id="close" onclick="closeViewer()">✕</div>

  <div id="book-wrapper">
    <div id="flipbook"></div>
  </div>

  <div id="left" class="arrow" onclick="prev()">❮</div>
  <div id="right" class="arrow" onclick="next()">❯</div>

  <div id="zoom-controls">
    <div class="zoom-btn" onclick="zoomIn()">+</div>
    <div class="zoom-btn" onclick="zoomOut()">−</div>
  </div>
</div>

<script src="data.js"></script>

<script>
const container = document.getElementById("books");

let zoom = 1;

// LOAD BOOKS
books.forEach(book => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${book.cover}">
    <p>${book.title}</p>
  `;

  div.onclick = () => openBook(book);
  container.appendChild(div);
});

// OPEN BOOK
function openBook(book) {
  document.getElementById("overlay").classList.add("active");

  const flip = $("#flipbook");
  flip.html("");

  // responsive size
  const width = Math.min(window.innerWidth * 0.6, 500);
  const height = width * 1.4; // maintain ratio

  $("#flipbook").css({
    width: width + "px",
    height: height + "px"
  });

  for (let i = 1; i <= book.pages; i++) {
    flip.append(`<div><img src="books/${book.id}/page${i}.jpg"></div>`);
  }

  if (flip.data("turn")) {
    flip.turn("destroy");
  }

  flip.turn({
    width: width,
    height: height,
    autoCenter: true,
    display: "single"
  });

  window.flip = flip;
}

// CLOSE
function closeViewer() {
  document.getElementById("overlay").classList.remove("active");
  if (window.flip) window.flip.turn("destroy");
}

// NAVIGATION
function next() {
  if (window.flip) window.flip.turn("next");
}

function prev() {
  if (window.flip) window.flip.turn("previous");
}

// ZOOM
function zoomIn() {
  zoom += 0.2;
  document.getElementById("book-wrapper").style.transform = `scale(${zoom})`;
}

function zoomOut() {
  zoom = Math.max(1, zoom - 0.2);
  document.getElementById("book-wrapper").style.transform = `scale(${zoom})`;
}
</script>

</body>
</html>
