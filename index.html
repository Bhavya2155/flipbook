<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Library</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

header {
  padding: 15px;
}

input {
  width: 250px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 180px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  margin: 0;
}
</style>
</head>

<body>

<header>
  <input type="text" id="search" placeholder="Search books...">
</header>

<div class="grid" id="bookList"></div>

<script src="data.js"></script>

<script>
const container = document.getElementById("bookList");
const search = document.getElementById("search");

function renderBooks(filter = "") {
  container.innerHTML = "";

  books
    .filter(b => b.title.toLowerCase().includes(filter.toLowerCase()))
    .forEach(book => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${book.cover}">
        <p>${book.title}</p>
      `;

      div.onclick = () => {
        window.location.href = `viewer.html?book=${book.id}`;
      };

      container.appendChild(div);
    });
}

search.addEventListener("input", e => {
  renderBooks(e.target.value);
});

renderBooks();
</script>

</body>
</html>
