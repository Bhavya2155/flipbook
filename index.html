<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Pro</title>

<!-- LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
<script src="https://hammerjs.github.io/dist/hammer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f2;
}

/* GRID */
.grid {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 180px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  display: none;
  z-index: 999;
}

/* BOOK */
#flipbook {
  width: 80vw;
  height: 85vh;
  margin: auto;
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CLOSE */
#close {
  position: absolute;
  top: 20px;
  right: 25px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* TOOLBAR */
#toolbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  background: rgba(255,255,255,0.15);
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
}

.tool {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="grid" id="books"></div>

<div id="overlay">
  <div id="close" onclick="closeViewer()">✕</div>
  <div id="flipbook"></div>

  <div id="toolbar">
    <span class="tool" onclick="zoomIn()">➕</span>
    <span class="tool" onclick="zoomOut()">➖</span>
    <span class="tool" onclick="toggleView()">📖</span>
  </div>
</div>

<script src="data.js"></script>

<script>
const container = document.getElementById("books");

let zoom = 1;
let singlePage = false;

// LOAD BOOKS
books.forEach(book => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${book.cover}">
    <p>${book.title}</p>
  `;

  div.onclick = () => openBook(book);
  container.appendChild(div);
});

// OPEN BOOK
function openBook(book) {
  document.getElementById("overlay").style.display = "block";

  const flip = $("#flipbook");
  flip.html("");

  for (let i = 1; i <= book.pages; i++) {
    flip.append(`<div><img src="books/${book.id}/page${i}.jpg"></div>`);
  }

  flip.turn({
    width: window.innerWidth * 0.8,
    height: window.innerHeight * 0.85,
    autoCenter: true,
    display: "double" // 🔥 double page
  });

  // TOUCH SUPPORT
  const hammer = new Hammer(document.getElementById("flipbook"));

  hammer.on("swipeleft", () => flip.turn("next"));
  hammer.on("swiperight", () => flip.turn("previous"));

  // PINCH ZOOM
  hammer.get("pinch").set({ enable: true });

  hammer.on("pinchmove", e => {
    zoom = Math.min(Math.max(1, e.scale), 3);
    flip.css("transform", `scale(${zoom})`);
  });
}

// CLOSE
function closeViewer() {
  document.getElementById("overlay").style.display = "none";
  $("#flipbook").turn("destroy");
}

// ZOOM BUTTONS
function zoomIn() {
  zoom += 0.2;
  $("#flipbook").css("transform", `scale(${zoom})`);
}

function zoomOut() {
  zoom -= 0.2;
  $("#flipbook").css("transform", `scale(${zoom})`);
}

// TOGGLE SINGLE / DOUBLE PAGE
function toggleView() {
  const flip = $("#flipbook");

  singlePage = !singlePage;

  flip.turn("display", singlePage ? "single" : "double");
}
</script>

</body>
</html>
