<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>

<style>
body {
  margin: 0;
  background: #111;
  overflow: hidden;
  font-family: sans-serif;
}

#book-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.5s ease;
}

.page img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  transition: transform 0.3s ease;
}

/* flip */
.next { transform: translateX(100%); }
.prev { transform: translateX(-100%); }

#backBtn {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 1000;
  padding: 10px 15px;
  background: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">← Back</button>
<div id="book-container"></div>

<script src="data.js"></script>

<script>
// 🔥 get book id
const params = new URLSearchParams(window.location.search);
const bookId = params.get("book");

// 🔥 find book
const book = books.find(b => b.id === bookId);

if (!book) {
  document.body.innerHTML = "Book not found";
  throw new Error("Invalid book");
}

// 🔥 generate pages
const pages = [];
for (let i = 1; i <= book.pages; i++) {
  pages.push(`books/${bookId}/page${i}.jpg`);
}

let currentPage = 0;
let scale = 1;

const container = document.getElementById("book-container");

// render
function render() {
  container.innerHTML = "";

  pages.forEach((src, i) => {
    const div = document.createElement("div");
    div.className = "page";

    if (i < currentPage) div.classList.add("prev");
    if (i > currentPage) div.classList.add("next");

    const img = document.createElement("img");
    img.src = src;

    // zoom
    img.addEventListener("wheel", (e) => {
      e.preventDefault();
      scale += e.deltaY * -0.001;
      scale = Math.min(Math.max(1, scale), 3);
      img.style.transform = `scale(${scale})`;
    });

    div.appendChild(img);
    container.appendChild(div);
  });
}

render();

// swipe
let startX = 0;

container.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

container.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) next();
  if (endX - startX > 50) prev();
});

// buttons logic
function next() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    scale = 1;
    render();
  }
}

function prev() {
  if (currentPage > 0) {
    currentPage--;
    scale = 1;
    render();
  }
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
